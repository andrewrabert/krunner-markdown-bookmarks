name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get tag annotation
        id: tag-msg
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          ref_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")
          tag_sha=$(echo "$ref_json" | jq -r '.object.sha')
          tag_msg=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.message')
          echo "msg<<TAGEOF" >> "$GITHUB_OUTPUT"
          echo "$tag_msg" >> "$GITHUB_OUTPUT"
          echo "TAGEOF" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          TAG_MSG: ${{ steps.tag-msg.outputs.msg }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="$TAG" \
            -f name="$TAG" \
            -f body="$TAG_MSG" \
            -F draft=false \
            -F prerelease=false

  aur:
    runs-on: ubuntu-latest
    needs: release
    container: archlinux:base-devel
    steps:
      - name: Setup
        run: |
          pacman -Syu --noconfirm openssh git

          useradd --create-home --shell /bin/bash builder

          mkdir -p /home/builder/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > /home/builder/.ssh/id_ed25519
          chmod 600 /home/builder/.ssh/id_ed25519
          chown -R builder:builder /home/builder
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Update AUR package
        run: |
          cat > /tmp/update-aur.sh <<'SCRIPT'
          export HOME=/home/builder

          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          git clone ssh://aur@aur.archlinux.org/plasma6-runners-markdown-bookmarks.git /tmp/aur
          cd /tmp/aur

          VERSION="$1"
          SOURCE_URL="https://github.com/andrewrabert/krunner-markdown-bookmarks/archive/${VERSION}.tar.gz"
          SHA256=$(curl -fsL "$SOURCE_URL" | sha256sum | cut -d' ' -f1)

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          makepkg --printsrcinfo > .SRCINFO

          git config user.name "Andrew Rabert"
          git config user.email "ar@nullsum.net"
          git add PKGBUILD .SRCINFO
          git diff-index --quiet HEAD || git commit -m "Update to ${VERSION}"
          git push
          SCRIPT
          chmod +x /tmp/update-aur.sh
          exec runuser builder --command "bash -l /tmp/update-aur.sh ${GITHUB_REF_NAME}"
